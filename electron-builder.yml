appId: com.gregpajak.pcdoctor-workbench
productName: PCDoctor Workbench
artifactName: "${productName}-Setup-${version}.${ext}"

# GitHub Releases as the auto-update feed. electron-updater pulls
# `latest.yml` + the .exe from the repo's Releases page. Public repo so no
# token is needed inside the app.
publish:
  - provider: github
    owner: gregpa
    repo: pcdoctor-workbench
    releaseType: release

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - dist/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/node-pty/**/*"

extraResources:
  - from: resources/icons
    to: icons
  # v2.3.0: bundle the PowerShell scripts so a fresh install can seed
  # C:\ProgramData\PCDoctor\ without requiring a pre-existing install.
  - from: powershell
    to: powershell

asar: true

win:
  target:
    - nsis
  icon: resources/icons/icon.ico
  signtoolOptions:
    publisherName: Greg Pajak
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  include: scripts/installer.nsh
