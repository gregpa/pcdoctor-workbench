appId: com.gregpajak.pcdoctor-workbench
productName: PCDoctor Workbench
# Hyphenated artifactName (no space) — GitHub Releases rewrites spaces in
# uploaded asset names to "." which breaks electron-updater's download
# (latest.yml keeps the literal hyphen and 404s on the renamed asset).
artifactName: "PCDoctor-Workbench-Setup-${version}.${ext}"

# GitHub Releases as the auto-update feed. electron-updater pulls
# `latest.yml` + the .exe from the repo's Releases page. Public repo so no
# token is needed inside the app.
#
# Forking: change `owner` and `repo` below to your own GitHub coordinates.
# electron-builder's YAML interpolation does NOT support bash-style
# `${env.X:-default}` fallbacks (tried in v2.4.6-pre, baked the literal
# template string into app-update.yml → 404 on every update check).
# Keep these hardcoded; forks edit this file. See docs/SIGNING.md for the
# full fork checklist (cert subject, publisher name, this block).
publish:
  - provider: github
    owner: gregpa
    repo: pcdoctor-workbench
    releaseType: release

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - dist/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  # node-pty is now bundled (repo moved to a space-free path so the native
  # rebuild succeeds). Embedded Claude terminal works in the packaged app.

extraResources:
  - from: resources/icons
    to: icons
  # v2.3.0: bundle the PowerShell scripts so a fresh install can seed
  # C:\ProgramData\PCDoctor\ without requiring a pre-existing install.
  - from: powershell
    to: powershell

asar: true

# node-pty ships N-API prebuilds that work under Electron's Node ABI without
# a local rebuild. Skipping the native rebuild step avoids a Python 3.14
# distutils incompatibility (node-gyp hasn't caught up yet). better-sqlite3
# still needs its own rebuild, which we do manually via `npm rebuild
# better-sqlite3` before packaging.
npmRebuild: false

asarUnpack:
  - "**/node_modules/node-pty/**/*"
  - "**/node_modules/better-sqlite3/**/*"

win:
  target:
    - nsis
  icon: resources/icons/icon.ico
  requestedExecutionLevel: asInvoker
  # v2.4.6: signing scaffold is in place (scripts/generate-signing-cert.ps1,
  # docs/SIGNING.md, .gitignore rule for build/signing/*.pfx) but the
  # signtoolOptions block below is commented out so v2.4.6 ships unsigned
  # like all prior releases. Flipping the switch is the whole point of a
  # future v2.4.7 "public readiness" cut — run generate-signing-cert.ps1,
  # set CSC_LINK + CSC_KEY_PASSWORD, uncomment the block, re-package.
  # Once enabled, every subsequent release MUST use the same PFX or
  # electron-updater will reject the update on existing installs.
  #
  # publisherName MUST match the CN of the signing cert exactly.
  # Mismatches cause electron-updater to reject valid updates. When you
  # fork, regenerate your own cert and update this value to match.
  # signtoolOptions:
  #   publisherName: "Greg Pajak (PCDoctor Workbench)"
  #   signingHashAlgorithms:
  #     - sha256

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  include: scripts/installer.nsh
